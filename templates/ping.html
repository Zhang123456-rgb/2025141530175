<!-- 调试信息 - 命令注入漏洞演示页面 -->
{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>🖥️ Ping 网络诊断</h2>
    <p>输入IP地址进行网络连通性测试</p>
    <form method="post" action="/ping" class="ping-form">
        <div class="form-group" style="display: flex; gap: 8px;">
            <input type="text" id="ip" name="ip" placeholder="输入IP地址，如 8.8.8.8" value="{{ ip or '' }}" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: monospace;">
            <button type="submit" class="btn">Ping</button>
        </div>
    </form>

    {% if cmd %}
    <p style="margin-top: 8px; font-size: 12px; color: #999;">执行命令: <code>{{ cmd }}</code></p>
    {% endif %}

    {% if result %}
    <div style="margin-top: 12px;">
        <h4>执行结果：</h4>
        <pre style="background: #1a1a1a; color: #00ff00; padding: 16px; border-radius: 6px; overflow-x: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; border: 1px solid #333;">{{ result }}</pre>
    </div>
    {% endif %}

    <div style="margin-top: 20px;">
        <a href="/" class="btn" style="text-decoration: none;">返回首页</a>
    </div>
</div>
{% endblock %}
