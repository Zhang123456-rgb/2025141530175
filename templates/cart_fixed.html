{% extends "base_fixed.html" %}
{% block content %}
<div class="card">
    <h2>🛒 购物车</h2>
    <p><strong>商品：</strong>{{ product_name }}</p>
    <p><strong>单价：</strong>¥{{ price }}</p>
    <p><strong>数量：</strong>{{ quantity }}</p>
    <p><strong>总价：</strong><span style="color:#e94560;font-size:24px;font-weight:bold;">¥{{ total }}</span></p>
    <div style="margin-top:20px;">
        <a href="/shop" class="btn" style="text-decoration:none;">继续购物</a>
        <a href="/" class="btn" style="text-decoration:none;">返回首页</a>
    </div>
</div>
{% endblock %}
