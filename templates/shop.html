<!-- 调试信息 - 商品价格由前端提交，可篡改 -->
{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>🛒 商城</h2>
    <p>选择商品加入购物车（价格由客户端提交）</p>
    <table class="search-table" style="margin-top: 16px;">
        <thead>
            <tr><th>ID</th><th>商品名称</th><th>价格</th><th>操作</th></tr>
        </thead>
        <tbody>
            {% for p in products %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.name }}</td>
                <td>¥{{ p.price }}</td>
                <td>
                    <form method="post" action="/cart" style="display: flex; gap: 4px; align-items: center;">
                        <input type="hidden" name="product_id" value="{{ p.id }}">
                        <input type="hidden" name="product_name" value="{{ p.name }}">
                        <input type="hidden" name="price" value="{{ p.price }}">
                        <input type="number" name="quantity" value="1" min="1" style="width: 60px; padding: 4px;">
                        <button type="submit" class="btn" style="padding: 6px 12px;">加入购物车</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <div style="margin-top: 20px;">
        <a href="/" class="btn" style="text-decoration: none;">返回首页</a>
    </div>
</div>
{% endblock %}
